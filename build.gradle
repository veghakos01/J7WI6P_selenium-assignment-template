plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    // Upgrade to modern Selenium 4!
    testImplementation 'org.seleniumhq.selenium:selenium-java:4.18.1'

    // Keep TestNG for our advanced points
    testImplementation 'org.testng:testng:7.7.0'
}

test {
    useTestNG()
}